<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生涯資産シミュレーター（積立＆取崩）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3498db;     
            --secondary: #e67e22;   
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
            background-color: var(--bg);
            color: var(--text);
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
            color: var(--text);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        #chartWrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }
        
        .summary {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .summary-item { text-align: center; width: 33%; }
        .summary-label { font-size: 0.95em; color: var(--text); font-weight: bold; margin-bottom: 5px; }
        .summary-value { font-size: 1.4em; font-weight: bold; }
        .acc-color { color: var(--primary); }
        .with-color { color: var(--secondary); }
        .alert-color { color: #e74c3c; }

        .input-sections {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .input-sections { grid-template-columns: 1fr 1fr; }
        }
        .section-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e2e8f0;
        }
        .section-title.acc { border-color: var(--primary); color: var(--primary); }
        .section-title.with { border-color: var(--secondary); color: var(--secondary); }

        .input-group {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .number-input {
            width: 100px;
            padding: 8px;
            font-size: 1em;
            text-align: right;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
        }
        .input-suffix { margin-left: 5px; font-weight: normal; color: #64748b; font-size: 0.9em;}
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #cbd5e1;
            border-radius: 5px;
            appearance: none;
            outline: none;
        }
        .slider-acc::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; background: var(--primary);
        }
        .slider-with::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; background: var(--secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>生涯資産シミュレーター（積立＆取崩）</h2>
            <div id="chartWrapper">
                <canvas id="simulationChart"></canvas>
            </div>
            
            <div class="summary">
                <div class="summary-item">
                    <div class="summary-label">積立完了時の資産</div>
                    <div class="summary-value acc-color" id="peakValue">0 円</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">最終残高</div>
                    <div class="summary-value with-color" id="finalValue">0 円</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">資産寿命</div>
                    <div class="summary-value" id="depletionValue">枯渇なし</div>
                </div>
            </div>
        </div>

        <div class="card input-sections">
            <div>
                <div class="section-title acc">▼ 積立フェーズ</div>
                <div class="input-group">
                    <div class="input-header">
                        <label>積立期間</label>
                        <div><input type="number" id="accYearsNum" class="number-input" value="20" min="0" max="50"><span class="input-suffix">年</span></div>
                    </div>
                    <input type="range" id="accYearsRange" class="slider-acc" min="0" max="50" step="1" value="20">
                </div>
                <div class="input-group">
                    <div class="input-header">
                        <label>毎月の積立額</label>
                        <div><input type="number" id="accAmountNum" class="number-input" value="30000" min="0" step="1000"><span class="input-suffix">円</span></div>
                    </div>
                    <input type="range" id="accAmountRange" class="slider-acc" min="0" max="300000" step="1000" value="30000">
                </div>
                <div class="input-group">
                    <div class="input-header">
                        <label>運用利回り(年率)</label>
                        <div><input type="number" id="accRateNum" class="number-input" value="5.0" step="0.1" min="0"><span class="input-suffix">％</span></div>
                    </div>
                    <input type="range" id="accRateRange" class="slider-acc" min="0" max="15" step="0.1" value="5.0">
                </div>
            </div>

            <div>
                <div class="section-title with">▼ 取崩フェーズ</div>
                <div class="input-group">
                    <div class="input-header">
                        <label>取崩期間</label>
                        <div><input type="number" id="withYearsNum" class="number-input" value="20" min="0" max="50"><span class="input-suffix">年</span></div>
                    </div>
                    <input type="range" id="withYearsRange" class="slider-with" min="0" max="50" step="1" value="20">
                </div>
                <div class="input-group">
                    <div class="input-header">
                        <label>毎月の取崩額</label>
                        <div><input type="number" id="withAmountNum" class="number-input" value="80000" min="0" step="1000"><span class="input-suffix">円</span></div>
                    </div>
                    <input type="range" id="withAmountRange" class="slider-with" min="0" max="500000" step="1000" value="80000">
                </div>
                <div class="input-group">
                    <div class="input-header">
                        <label>運用利回り(年率)</label>
                        <div><input type="number" id="withRateNum" class="number-input" value="3.0" step="0.1" min="0"><span class="input-suffix">％</span></div>
                    </div>
                    <input type="range" id="withRateRange" class="slider-with" min="0" max="15" step="0.1" value="3.0">
                </div>
            </div>
        </div>
    </div>

    <script>
        const els = {
            accYears: { n: document.getElementById('accYearsNum'), r: document.getElementById('accYearsRange') },
            accAmount: { n: document.getElementById('accAmountNum'), r: document.getElementById('accAmountRange') },
            accRate: { n: document.getElementById('accRateNum'), r: document.getElementById('accRateRange') },
            withYears: { n: document.getElementById('withYearsNum'), r: document.getElementById('withYearsRange') },
            withAmount: { n: document.getElementById('withAmountNum'), r: document.getElementById('withAmountRange') },
            withRate: { n: document.getElementById('withRateNum'), r: document.getElementById('withRateRange') }
        };
        const summary = {
            peak: document.getElementById('peakValue'),
            final: document.getElementById('finalValue'),
            depletion: document.getElementById('depletionValue')
        };

        let chart = null;

        function update() {
            const aY = parseInt(els.accYears.n.value) || 0;
            const aP = parseFloat(els.accAmount.n.value) || 0;
            const aR = (parseFloat(els.accRate.n.value) || 0) / 100 / 12;
            
            const wY = parseInt(els.withYears.n.value) || 0;
            const wP = parseFloat(els.withAmount.n.value) || 0;
            const wR = (parseFloat(els.withRate.n.value) || 0) / 100 / 12;

            let labels = [];
            let accData = [];
            let withData = [];
            let balance = 0;
            let depletionYear = null;

            // X軸のラベルを作成するときに、最初から「数値」の配列として作成する
            for (let y = 0; y <= aY; y++) {
                labels.push(y); // '年目'という文字列ではなく数値として追加
                if (y === 0) {
                    accData.push(balance);
                    withData.push(null);
                    continue;
                }
                for (let m = 0; m < 12; m++) { balance = balance * (1 + aR) + aP; }
                accData.push(Math.floor(balance));
                withData.push(y === aY ? Math.floor(balance) : null);
            }

            const peakBalance = balance;

            for (let y = 1; y <= wY; y++) {
                labels.push(aY + y); // ここも数値として追加
                if (balance <= 0) {
                    accData.push(null);
                    withData.push(0);
                    continue;
                }
                for (let m = 0; m < 12; m++) {
                    balance = balance * (1 + wR) - wP;
                    if (balance < 0) {
                        balance = 0;
                        if (!depletionYear) depletionYear = aY + y;
                    }
                }
                accData.push(null);
                withData.push(Math.floor(balance));
            }

            summary.peak.textContent = Math.floor(peakBalance).toLocaleString() + ' 円';
            summary.final.textContent = Math.floor(balance).toLocaleString() + ' 円';
            
            if (depletionYear) {
                summary.depletion.textContent = `${depletionYear}年目で枯渇`;
                summary.depletion.className = 'summary-value alert-color';
            } else {
                summary.depletion.textContent = '枯渇なし';
                summary.depletion.className = 'summary-value';
            }

            renderChart(labels, accData, withData);
        }

        function renderChart(labels, accData, withData) {
            const ctx = document.getElementById('simulationChart').getContext('2d');
            if (chart) chart.destroy();
            
            const darkText = '#1e293b';
            const fontSettings = { weight: 'bold', family: "'Helvetica Neue', Arial, sans-serif" };

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels, // 中身は数値の配列
                    datasets: [
                        { label: '積立フェーズ', data: accData, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)', fill: true, tension: 0.1, pointRadius: 0 },
                        { label: '取崩フェーズ', data: withData, borderColor: '#e67e22', backgroundColor: 'rgba(230, 126, 34, 0.2)', fill: true, tension: 0.1, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    color: darkText,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { labels: { color: darkText, font: fontSettings } },
                        tooltip: { 
                            callbacks: { 
                                title: function(context) { return context[0].label + '年目'; },
                                label: c => c.dataset.label + ': ' + c.parsed.y.toLocaleString() + '円' 
                            } 
                        } 
                    },
                    scales: { 
                        x: { 
                            type: 'linear', // X軸を連続した数値の軸として扱う
                            min: 0,
                            max: labels[labels.length - 1], // 期間の最大値
                            ticks: { 
                                color: darkText, 
                                font: fontSettings,
                                stepSize: 5, // 5年刻みに強制
                                callback: function(value) { return value + '年目'; }, // ラベルに「年目」を追加
                                maxRotation: 0 
                            },
                            grid: {
                                display: true,
                                color: '#e2e8f0' // 縦のグリッド線の色
                            }
                        },
                        y: { 
                            beginAtZero: true,
                            ticks: { color: darkText, font: fontSettings, callback: v => v.toLocaleString() + '円' } 
                        } 
                    }
                }
            });
        }

        function sync(el) {
            el.r.addEventListener('input', () => { el.n.value = el.r.value; update(); });
            el.n.addEventListener('input', () => { el.r.value = el.n.value; update(); });
        }

        Object.values(els).forEach(sync);

        window.onload = update;
    </script>
</body>
</html>
